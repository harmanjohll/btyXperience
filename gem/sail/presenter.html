<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet View — Beatty SAIL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bty-blue: #000C53;
            --bty-yellow: #FFE200;
            --bty-red: #EC3237;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(180deg, #000820 0%, #001050 30%, #002080 60%, #003399 85%, #1a5276 100%);
            color: white;
            overflow: hidden;
            height: 100dvh;
            width: 100dvw;
        }

        /* === OCEAN === */
        .ocean {
            position: absolute; inset: 0;
            overflow: hidden;
        }

        /* Animated waves at the bottom */
        .wave-layer {
            position: absolute;
            bottom: 0; left: -50%;
            width: 200%; height: 120px;
            border-radius: 50% 50% 0 0;
        }
        .wave-1 { background: rgba(26, 82, 118, 0.4); animation: waveShift 7s ease-in-out infinite; bottom: 0; }
        .wave-2 { background: rgba(26, 82, 118, 0.25); animation: waveShift 9s ease-in-out infinite reverse; bottom: -10px; height: 100px; }
        .wave-3 { background: rgba(26, 82, 118, 0.15); animation: waveShift 6s ease-in-out infinite; bottom: -20px; height: 80px; animation-delay: -3s; }
        @keyframes waveShift { 0%,100% { transform: translateX(-3%); } 50% { transform: translateX(3%); } }

        /* Stars in the sky area */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 40%;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 30% 8%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1.5px 1.5px at 50% 20%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 70% 12%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1.5px 1.5px at 60% 5%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 40% 28%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 90% 18%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 25% 22%, rgba(255,255,255,0.5), transparent);
        }

        /* Horizon glow */
        .horizon {
            position: absolute;
            top: 38%; left: 0; width: 100%; height: 30%;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 226, 0, 0.06) 0%, transparent 70%);
        }

        /* === FLEET AREA === */
        .fleet-area {
            position: absolute;
            top: 30%; left: 0; width: 100%; height: 65%;
            overflow: visible;
        }

        /* Individual boat in the fleet */
        .fleet-boat {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s;
            animation: bobbing 4s ease-in-out infinite;
        }
        .fleet-boat:hover { transform: scale(1.3) !important; z-index: 100; }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Boat entrance */
        .boat-enter {
            animation: boatSailIn 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes boatSailIn {
            0% { opacity: 0; transform: translateX(100vw) scale(0.5); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        /* Spotlight modal */
        .spotlight-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0, 8, 32, 0.85);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .spotlight-card {
            background: #0f172a;
            border-radius: 1.5rem;
            border: 3px solid var(--bty-yellow);
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: spotPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes spotPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* HUD */
        .hud {
            position: fixed;
            top: 1.5rem; left: 1.5rem;
            z-index: 50;
        }
        .hud-counter {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 226, 0, 0.3);
            border-radius: 1rem;
            padding: 0.75rem 1.5rem;
        }

        /* Title */
        .title-bar {
            position: fixed;
            top: 1.5rem;
            left: 50%; transform: translateX(-50%);
            z-index: 50;
            text-align: center;
        }

        /* Compass rose decoration */
        .compass-rose {
            position: fixed;
            bottom: 2rem; right: 2rem;
            z-index: 50;
            opacity: 0.15;
        }
    </style>
</head>
<body>

    <!-- Ocean scene -->
    <div class="ocean">
        <div class="stars"></div>
        <div class="horizon"></div>
        <div class="wave-layer wave-1"></div>
        <div class="wave-layer wave-2"></div>
        <div class="wave-layer wave-3"></div>
    </div>

    <!-- Fleet area where boats appear -->
    <div class="fleet-area" id="fleetArea"></div>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-counter">
            <span class="text-yellow-400 font-black text-3xl" id="boatCount">0</span>
            <span class="text-gray-400 text-sm ml-2">boats in the fleet</span>
        </div>
    </div>

    <!-- Title -->
    <div class="title-bar">
        <h1 class="text-2xl font-black tracking-tight text-white/80">
            <span style="color: var(--bty-yellow);">S</span>tewardship &middot;
            <span style="color: var(--bty-yellow);">A</span>pplied Learning &middot;
            <span style="color: var(--bty-yellow);">I</span>nternational & Industry &middot;
            <span style="color: var(--bty-yellow);">L</span>earning
        </h1>
        <p class="text-gray-500 text-xs mt-1 tracking-widest uppercase">Beatty Secondary School &middot; Open House Fleet</p>
    </div>

    <!-- Compass rose -->
    <div class="compass-rose">
        <img src="https://raw.githubusercontent.com/harmanjohll/btyXperience/fc98005f3682a779482dd1bf5e7cff5f9adb8451/gem/BTlogo.png" alt="Beatty Crest" class="h-24 w-24 opacity-40">
    </div>

    <!-- Spotlight overlay (hidden by default) -->
    <div class="spotlight-overlay" id="spotlight" style="display:none;" onclick="closeSpotlight()">
        <div class="spotlight-card" id="spotlightCard" onclick="event.stopPropagation()"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBjHO57QKoMW-u4oLGGdgDSqw5gttqX6Fg", authDomain: "btyx-61dc6.firebaseapp.com", projectId: "btyx-61dc6", storageBucket: "btyx-61dc6.appspot.com", messagingSenderId: "851137405745", appId: "1:851137405745:web:c95b86b6f0462a9bc20610" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const fleetArea = document.getElementById('fleetArea');
        const boatCountEl = document.getElementById('boatCount');
        const spotlightEl = document.getElementById('spotlight');
        const spotlightCardEl = document.getElementById('spotlightCard');

        const boats = new Map(); // uid -> boat data
        let boatElements = new Map(); // uid -> DOM element

        // Color & label maps
        const sailLabels = {
            korea: 'South Korea — A.I.',
            japan: 'Japan — Culture',
            nz: 'New Zealand — Leadership',
            industry: 'Industry — Engineering'
        };
        const valueLabels = {
            discipline: '⚓ Discipline',
            resilience: '🔥 Resilience',
            empathy: '💙 Empathy',
            adaptability: '🌊 Adaptability'
        };
        const leaderLabels = {
            model: 'Leads by example',
            inspire: 'Inspires shared vision',
            challenge: 'Challenges the status quo',
            enable: 'Lifts others up'
        };
        const challengeLabels = {
            ai: 'Smart city AI',
            green: 'Green engineering',
            robotics: 'Robotics & automation',
            creative: 'Creative design'
        };

        function buildMiniBoatSVG(data, size = 60) {
            const hull = data.hullColor || '#1e3a5f';
            const keel = data.keelColor || '#0f2a4a';
            const sail = data.sailColor || '#ffffff';
            const flag = data.flagColor || '#FFE200';
            const sailGrad = data.sailGradient;

            const gradDef = sailGrad
                ? `<defs><linearGradient id="sg_${data.uid}" x1="0%" y1="0%" x2="100%" y2="100%">
                     <stop offset="0%" style="stop-color:${sailGrad[0]}"/>
                     <stop offset="100%" style="stop-color:${sailGrad[1]}"/>
                   </linearGradient></defs>`
                : '';
            const sailFill = sailGrad ? `url(#sg_${data.uid})` : sail;

            return `
            <svg viewBox="0 0 280 280" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
                ${gradDef}
                <ellipse cx="140" cy="240" rx="100" ry="6" fill="rgba(59,130,246,0.2)"/>
                <path d="M60,200 L80,235 L200,235 L220,200 Z" fill="${hull}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                <line x1="70" y1="205" x2="210" y2="205" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <rect x="135" y="195" width="10" height="45" rx="2" fill="${keel}"/>
                <line x1="140" y1="55" x2="140" y2="200" stroke="#3d2b1a" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M145,65 L145,185 L230,175 Z" fill="${sailFill}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                <path d="M135,70 L135,180 L70,170 Z" fill="${sailFill}" opacity="0.7"/>
                <path d="M140,55 L140,35 L165,42 L140,49 Z" fill="${flag}"/>
            </svg>`;
        }

        function placeBoat(data) {
            if (boatElements.has(data.uid)) return; // already placed

            const el = document.createElement('div');
            el.className = 'fleet-boat boat-enter';

            // Random position in the fleet area
            const areaW = fleetArea.clientWidth;
            const areaH = fleetArea.clientHeight;
            const x = 40 + Math.random() * (areaW - 120);
            const y = 20 + Math.random() * (areaH - 100);
            const size = 50 + Math.random() * 30;
            const delay = Math.random() * 0.5;
            const bobDelay = Math.random() * 4;

            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.animationDelay = delay + 's';
            el.style.setProperty('--bob-delay', bobDelay + 's');

            el.innerHTML = buildMiniBoatSVG({ ...data, uid: data.uid || Math.random().toString(36) }, size);
            el.dataset.uid = data.uid;

            // After entrance animation, switch to bobbing
            el.addEventListener('animationend', () => {
                el.classList.remove('boat-enter');
                el.style.animationDelay = bobDelay + 's';
            }, { once: true });

            el.addEventListener('click', () => showSpotlight(data));
            fleetArea.appendChild(el);
            boatElements.set(data.uid, el);

            boatCountEl.textContent = boatElements.size;
        }

        // Expose to window for onclick
        window.closeSpotlight = function() {
            spotlightEl.style.display = 'none';
        };

        function showSpotlight(data) {
            const sail = data.sailColor || '#3b82f6';
            spotlightCardEl.innerHTML = `
                <div class="mb-4">${buildMiniBoatSVG({ ...data, uid: 'spot' }, 120)}</div>
                <h2 class="text-2xl font-black mb-1" style="color:${sail};">${(data.aspiration || 'VOYAGER').toUpperCase()}</h2>
                <p class="text-gray-500 text-xs uppercase tracking-widest mb-4">Aspiration</p>

                <div class="text-left space-y-2 text-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-yellow-400 font-black">S</span>
                        <span class="text-gray-300">${leaderLabels[data.stewardshipChoice] || '—'}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-yellow-400 font-black">A</span>
                        <span class="text-gray-300">${challengeLabels[data.appliedChoice] || '—'}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-yellow-400 font-black">I</span>
                        <span class="text-gray-300">${sailLabels[data.internationalChoice] || '—'}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-yellow-400 font-black">L</span>
                        <span class="text-gray-300">${valueLabels[data.learningChoice] || '—'}</span>
                    </div>
                </div>

                <button onclick="closeSpotlight()" class="mt-6 px-6 py-2 bg-yellow-400 text-blue-900 font-bold rounded-xl text-sm">Close</button>
            `;
            spotlightEl.style.display = 'flex';
        }

        // === LISTEN TO FIREBASE FOR BOATS ===
        onSnapshot(collection(db, "sailBoats"), (snapshot) => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added' || change.type === 'modified') {
                    const data = { uid: change.doc.id, ...change.doc.data() };
                    boats.set(data.uid, data);
                    if (data.aspiration) { // Only show completed boats
                        placeBoat(data);
                    }
                }
            });
        });

        // === DEMO: Add test boats on keypress (for testing) ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'd') {
                const testHulls = ['#3b82f6', '#f59e0b', '#ef4444', '#10b981'];
                const testSails = ['#3b82f6', '#ec4899', '#10b981', '#f59e0b'];
                const testFlags = ['#3b82f6', '#ef4444', '#ec4899', '#10b981'];
                const testWords = ['COURAGE', 'DREAM', 'INNOVATE', 'LEAD', 'CREATE', 'EXPLORE', 'INSPIRE', 'SERVE', 'DISCOVER', 'BUILD'];
                const testStewardship = ['model', 'inspire', 'challenge', 'enable'];
                const testApplied = ['ai', 'green', 'robotics', 'creative'];
                const testIntl = ['korea', 'japan', 'nz', 'industry'];
                const testLearning = ['discipline', 'resilience', 'empathy', 'adaptability'];

                const r = (arr) => arr[Math.floor(Math.random() * arr.length)];
                const sailChoice = r(testIntl);
                const sailGradientMap = {
                    korea: ['#3b82f6', '#60a5fa'],
                    japan: ['#ec4899', '#f9a8d4'],
                    nz: ['#10b981', '#6ee7b7'],
                    industry: ['#f59e0b', '#fcd34d']
                };

                placeBoat({
                    uid: 'demo_' + Date.now() + '_' + Math.random().toString(36).slice(2),
                    hullColor: r(testHulls),
                    keelColor: r(testHulls),
                    sailColor: r(testSails),
                    sailGradient: sailGradientMap[sailChoice],
                    flagColor: r(testFlags),
                    aspiration: r(testWords),
                    stewardshipChoice: r(testStewardship),
                    appliedChoice: r(testApplied),
                    internationalChoice: sailChoice,
                    learningChoice: r(testLearning),
                    flagIcon: r(['⚓','🔥','💙','🌊'])
                });
            }
        });
    </script>
</body>
</html>
